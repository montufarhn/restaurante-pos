<!-- public/admin.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración del Restaurante</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 data-i18n="config_title">Configuración del Restaurante</h1>
            <button id="btn-logout" class="btn-danger" data-i18n="logout">Cerrar Sesión</button>
        </header>
        <main>
            <form id="form-config" class="admin-panel">
                <h2 data-i18n="desc_admin">Datos de Facturación</h2>
                
                <div class="form-group">
                    <label for="nombre" data-i18n="rest_name">Nombre del Restaurante:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="rtn">RTN:</label>
                    <input type="text" id="rtn" name="rtn" required>
                </div>

                <div class="form-group">
                    <label for="cai">CAI:</label>
                    <input type="text" id="cai" name="cai" required>
                </div>

                <div class="form-group-inline">
                    <div class="form-group">
                        <label for="rangoInicio" data-i18n="billing_range_start">Rango de Facturación (Inicio):</label>
                        <input type="text" id="rangoInicio" name="rangoInicio" required>
                    </div>
                    <div class="form-group">
                        <label for="rangoFin" data-i18n="billing_range_end">Rango de Facturación (Fin):</label>
                        <input type="text" id="rangoFin" name="rangoFin" required>
                    </div>
                </div>

                <div class="form-group-inline">
                    <div class="form-group">
                        <label for="idioma" data-i18n="language">Idioma:</label>
                        <select id="idioma" name="idioma">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="ja">日本語</option>
                            <option value="pt">Português</option>
                            <option value="zh">中文</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="moneda" data-i18n="currency">Moneda:</label>
                        <select id="moneda" name="moneda">
                            <option value="BZ$">Belize Dollar (BZ$)</option>
                            <option value="€">Euro (€)</option>
                            <option value="L.">Lempira (L.)</option>
                            <option value="£">Pound Sterling (£)</option>
                            <option value="Q">Quetzal (Q)</option>
                            <option value="$">US Dollar ($)</option>
                            <option value="CN¥">人民币 (¥)</option>
                            <option value="¥">日本円 (¥)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="logo" data-i18n="image">Logo del Restaurante:</label>
                    <input type="file" id="logo" name="logo" accept="image/png, image/jpeg">
                    <div id="logo-preview-container">
                        <p data-i18n="preview">Vista Previa:</p>
                        <img id="logo-preview" src="" alt="Vista previa del logo" style="max-width: 150px; display: none;">
                    </div>
                </div>

                <button type="submit" class="btn-success" data-i18n="save_config">Guardar Configuración</button>
            </form>
        </main>

        <div class="admin-panel" style="margin-top: 20px;">
            <h2 data-i18n="user_management">Gestión de Usuarios</h2>
            <form id="form-user">
                <input type="hidden" id="edit-user-id">
                <div class="form-group">
                    <label for="new-username" data-i18n="username">Usuario:</label>
                    <input type="text" id="new-username" required>
                </div>
                <div id="password-group" class="form-group">
                    <label for="new-password" data-i18n="password">Contraseña:</label>
                    <input type="password" id="new-password">
                </div>
                <div class="form-group">
                    <label for="new-role" data-i18n="role">Rol:</label>
                    <select id="new-role">
                        <option value="admin" data-i18n="role_admin">Administrador</option>
                        <option value="caja" data-i18n="role_cashier">Cajero</option>
                        <option value="cocina" data-i18n="role_kitchen">Cocina</option>
                    </select>
                </div>
                <button type="submit" id="btn-user-submit" class="btn-success" data-i18n="create_user">Crear Usuario</button>
                <button type="button" id="btn-user-cancel" class="btn-secondary hidden" data-i18n="cancel">Cancelar</button>
            </form>
            
            <h3 data-i18n="user_list" style="margin-top: 20px;">Lista de Usuarios</h3>
            <ul id="user-list" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>

    <script src="locales.js"></script>
    <script src="sqlite-service.js"></script>
    <script src="api-proxy.js"></script>
    <script src="app.js"></script>
    <script>
        const formConfig = document.getElementById('form-config');
        const formUser = document.getElementById('form-user');
        const userList = document.getElementById('user-list');
        const logoInput = document.getElementById('logo');
        const logoPreview = document.getElementById('logo-preview');
        const editUserIdInput = document.getElementById('edit-user-id');
        const btnUserSubmit = document.getElementById('btn-user-submit');
        const btnUserCancel = document.getElementById('btn-user-cancel');
        const passwordGroup = document.getElementById('password-group');
        let currentLang = 'es';
        let allUsers = [];

        // Lógica de Logout
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await App.logout();
        });

        // Cargar la configuración actual al abrir la página
        async function cargarConfiguracion() {
            try {
                await API.init();
                const config = await API.getConfig();
                currentLang = config.idioma || 'es';

                document.getElementById('nombre').value = config.nombre || '';
                document.getElementById('rtn').value = config.rtn || '';
                document.getElementById('cai').value = config.cai || '';
                document.getElementById('rangoInicio').value = config.rangoInicio || '';
                document.getElementById('rangoFin').value = config.rangoFin || '';
                document.getElementById('idioma').value = config.idioma || 'es';
                document.getElementById('moneda').value = config.moneda || 'L.';

                const lang = config.idioma || 'es';
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang][key]) {
                        el.textContent = translations[lang][key];
                    }
                });

                if (config.logo) {
                    logoPreview.src = config.logo;
                    logoPreview.style.display = 'block';
                }
                cargarUsuarios();
            } catch (e) {
                console.error('Error al cargar config:', e);
            }
        }

        // Manejar el envío del formulario para guardar la configuración
        formConfig.addEventListener('submit', async (e) => {
            e.preventDefault();

            const updates = {
                nombre: document.getElementById('nombre').value,
                rtn: document.getElementById('rtn').value,
                cai: document.getElementById('cai').value,
                rangoInicio: document.getElementById('rangoInicio').value,
                rangoFin: document.getElementById('rangoFin').value,
                idioma: document.getElementById('idioma').value,
                moneda: document.getElementById('moneda').value,
                logo: logoPreview.src // Guardar la base64 del preview
            };

            try {
                const logoFile = logoInput.files[0];
                await API.saveConfig(updates, logoFile);
                alert(translations[currentLang]['alert_config_saved']);
                cargarConfiguracion();
            } catch (err) {
                alert(translations[currentLang]['alert_config_error']);
            }
        });

        // Cargar lista de usuarios
        async function cargarUsuarios() {
            try {
                allUsers = await API.getUsers();
                userList.innerHTML = '';
                allUsers.forEach(user => {
                    const li = document.createElement('li');
                    li.className = 'admin-menu-item';
                    const roleKey = `role_${user.role === 'caja' ? 'cashier' : user.role}`;
                    const roleText = (translations[currentLang] && translations[currentLang][roleKey]) || user.role;
                    li.innerHTML = `
                        <span><strong>${user.username}</strong> (${roleText})</span>
                        <div>
                            <button class="btn-secondary btn-edit-user" data-id="${user.id}">${(translations[currentLang] && translations[currentLang]['edit']) || 'Editar'}</button>
                            <button class="btn-secondary btn-change-pass" data-id="${user.id}">${(translations[currentLang] && translations[currentLang]['change_password']) || 'Cambiar Contraseña'}</button>
                            <button class="btn-danger btn-delete-user" data-id="${user.id}">${(translations[currentLang] && translations[currentLang]['delete']) || 'Borrar'}</button>
                        </div>
                    `;
                    userList.appendChild(li);
                });
            } catch (e) {
                console.error('Error cargando usuarios:', e);
            }
        }

        // Crear o Editar usuario
        formUser.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = editUserIdInput.value;
            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            try {
                if (id) {
                    // Modo Edición (Username y Role)
                    await API.updateUser(id, { username, role });
                    alert(translations[currentLang]['alert_config_saved']);
                } else {
                    // Modo Creación
                    if (!password) {
                        alert(translations[currentLang]['password'] + " es obligatoria");
                        return;
                    }
                    await API.createUser({ username, password, role });
                    alert(translations[currentLang]['alert_user_created']);
                }
                resetUserForm();
                cargarUsuarios();
            } catch (err) {
                alert(`${translations[currentLang]['alert_user_error']}: ${err.message}`);
            }
        });

        function resetUserForm() {
            formUser.reset();
            editUserIdInput.value = '';
            btnUserSubmit.textContent = (translations[currentLang] && translations[currentLang]['create_user']) || 'Crear Usuario';
            btnUserSubmit.setAttribute('data-i18n', 'create_user');
            btnUserCancel.classList.add('hidden');
            passwordGroup.classList.remove('hidden');
            document.getElementById('new-password').required = true;
        }

        btnUserCancel.onclick = resetUserForm;

        // Manejar acciones de usuario (Borrar / Editar / Cambiar Contraseña)
        userList.addEventListener('click', async (e) => {
            const id = e.target.dataset.id;
            if (!id) return;

            // Borrar
            if (e.target.classList.contains('btn-delete-user')) {
                if (confirm(translations[currentLang]['confirm_delete_user'])) {
                    try {
                        await API.deleteUser(id);
                        alert(translations[currentLang]['alert_user_deleted']);
                        cargarUsuarios();
                    } catch (err) {
                        alert(err.message || translations[currentLang]['alert_user_error']);
                    }
                }
            }
            
            // Editar (Cargar en formulario)
            if (e.target.classList.contains('btn-edit-user')) {
                const user = allUsers.find(u => u.id == id);
                if (user) {
                    editUserIdInput.value = user.id;
                    document.getElementById('new-username').value = user.username;
                    document.getElementById('new-role').value = user.role;

                    btnUserSubmit.textContent = translations[currentLang]['save'];
                    btnUserSubmit.setAttribute('data-i18n', 'save');
                    btnUserCancel.classList.remove('hidden');
                    passwordGroup.classList.add('hidden'); // Ocultar password en edición general
                    document.getElementById('new-password').required = false;
                    window.scrollTo(0, formUser.offsetTop - 20);
                }
            }

            // Cambiar Contraseña
            if (e.target.classList.contains('btn-change-pass')) {
                const newPass = prompt(translations[currentLang]['new_password_prompt']);
                if (newPass) {
                    try {
                        await API.updateUserPassword(id, newPass);
                        alert(translations[currentLang]['alert_password_changed']);
                    } catch (err) {
                        alert(translations[currentLang]['alert_password_error']);
                    }
                }
            }
        });

        // Mostrar vista previa del logo al seleccionarlo
        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                logoPreview.src = URL.createObjectURL(file);
                logoPreview.style.display = 'block';
            }
        });

        // Carga inicial
        cargarConfiguracion();
    </script>
</body>
</html>
